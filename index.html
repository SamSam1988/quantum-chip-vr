<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Quantum Chip Photon VR v18</title>
  <style>
    html,body{margin:0;overflow:hidden;background:#030609;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}
    #ui{position:fixed;left:8px;top:8px;z-index:10;display:flex;gap:5px;flex-wrap:wrap;max-width:92vw}
    /* v17: all buttons ~30% smaller */
    button{border:0;border-radius:8px;padding:8px 10px;font-weight:800;font-size:10px;background:#59ffc0;color:#02110c;box-shadow:0 0 12px rgba(89,255,192,.30)}
    button.secondary{background:#ffe16b;color:#100d00} button.dark{background:#dde8ff;color:#06101f}
    button.boost{background:#ff7a3d;color:#1b0a00;box-shadow:0 0 12px rgba(255,122,61,.40)}
    button.boost.active{background:#ff3d3d;color:#fff;box-shadow:0 0 16px rgba(255,61,61,.7)}
    /* v17: HUD strip with speed clock, altitude clock, mini map, Qarakal/Basil */
    #hud{position:fixed;right:8px;bottom:8px;z-index:10;background:rgba(0,0,0,.55);padding:5px 6px;border-radius:10px;display:flex;gap:6px;align-items:flex-end;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 12px rgba(89,255,192,.12)}
    #hud .cell{width:78px;text-align:center;color:#fff;font-family:system-ui,-apple-system,sans-serif}
    #hud .lbl{font-size:7px;opacity:.78;text-transform:uppercase;letter-spacing:.07em}
    #hud .val{font-size:13px;font-weight:900;line-height:1.0;margin:1px 0}
    #hud .unit{font-size:7px;opacity:.78}
    #hud .gauge{position:relative;width:64px;height:18px;margin:2px auto 0;overflow:hidden}
    #hud .arc{position:absolute;left:6px;top:2px;width:52px;height:26px;border:2px solid rgba(221,232,255,.28);border-bottom:0;border-radius:52px 52px 0 0}
    #hud .needle{position:absolute;left:31px;bottom:0;width:2px;height:16px;background:#59ffc0;border-radius:3px;transform-origin:50% 100%;transform:rotate(-82deg);box-shadow:0 0 6px rgba(89,255,192,.7)}
    #hud #altNeedle{background:#ffd166;box-shadow:0 0 6px rgba(255,209,102,.7)}
    #hud .logo-cell{width:auto;display:flex;align-items:center;justify-content:center;padding:0 4px}
    #hud .logo-cell img{height:60px;max-height:60px;width:auto;display:block;object-fit:contain}
    #hud .logo-cell img.hidden{display:none}
    #status{position:fixed;right:8px;top:8px;z-index:10;background:rgba(0,0,0,.62);padding:8px 10px;border-radius:8px;font-size:11px;transition:opacity .7s ease}
    #status.hidden{opacity:0;pointer-events:none}
    #center{position:fixed;left:50%;top:50%;width:10px;height:10px;margin-left:-5px;margin-top:-5px;border:1px solid rgba(255,255,255,.7);border-radius:50%;z-index:9;pointer-events:none}
    canvas{display:block}
  </style>
</head>
<body>
  <div id="ui">
    <button id="startBtn">START FLYING</button>
    <button class="boost" id="boostBtn">BOOST: OFF</button>
    <button class="secondary" id="motionBtn">ENABLE PHONE MOTION</button>
    <button class="dark" id="cardboardBtn">CARDBOARD SPLIT: OFF</button>
    <button class="dark" id="resetBtn">RESET</button>
    <button class="dark" id="fullBtn">FULL SCREEN</button>
  </div>
  <div id="status">Loading real GDS texture...</div>
  <div id="hud">
    <div class="cell">
      <div class="lbl">speed</div>
      <div class="val" id="speedValue">—</div>
      <div class="unit">µm/s</div>
      <div class="gauge"><div class="arc"></div><div id="needle" class="needle"></div></div>
    </div>
    <div class="cell">
      <div class="lbl">altitude</div>
      <div class="val" id="altValue">—</div>
      <div class="unit">µm</div>
      <div class="gauge"><div class="arc"></div><div id="altNeedle" class="needle"></div></div>
    </div>
    <div class="cell logo-cell">
      <img id="logo" src="qarakal-logo.svg" alt="Qarakal" onerror="this.classList.add('hidden')" />
    </div>
  </div>
  <div id="center"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script src="chip-data.js"></script>
  <script>
  (()=>{
    const status=document.getElementById('status'), hud=document.getElementById('hud'),
          speedValue=document.getElementById('speedValue'), needle=document.getElementById('needle'),
          altValue=document.getElementById('altValue'), altNeedle=document.getElementById('altNeedle');
    let running=false, cardboard=false, motion=false, boost=false;
    let yaw=0, pitch=-0.42, targetYaw=0, targetPitch=-0.42, lastT=performance.now();
    let initialOri=null, currentOri=null;
    const data=window.CHIP_DATA || {bbox:[0,0,10000,10000],layers:{}};
    const bbox=data.bbox || [0,0,10000,10000];
    const chipUm={w:bbox[2]-bbox[0], h:bbox[3]-bbox[1]};
    const UM_PER_UNIT=1000;
    const chipW=chipUm.w/UM_PER_UNIT, chipH=chipUm.h/UM_PER_UNIT;
    const NB_THICKNESS_UM=1; // visual Nb thickness (real ~200 nm). Photon can dip into trenches by this amount.
    const maxZ=10000, minZ=0;
    const state={x:chipUm.w/2, y:chipUm.h/2, z:2200};
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x030609);
    const camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.0005, 80);
    camera.up.set(0,0,1);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,3.5)); renderer.setSize(innerWidth,innerHeight); document.body.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff,0x445566,1.25));
    const dirLight=new THREE.DirectionalLight(0xffffff,1.2); dirLight.position.set(2,5,3); scene.add(dirLight);
    const siThicknessUnit=500/UM_PER_UNIT;
    const baseGeo=new THREE.BoxGeometry(chipW,chipH,siThicknessUnit);
    const baseMat=new THREE.MeshStandardMaterial({color:0x171a1d,roughness:.9,metalness:.01});
    const base=new THREE.Mesh(baseGeo,baseMat); base.position.set(0,0,-siThicknessUnit/2); scene.add(base);

    // ---- v13: real 3D Nb layer with etched holes (layer 134). Photon can't pass through it.
    function nbMapPt(p){ return [(p[0]-bbox[0]-chipUm.w/2)/UM_PER_UNIT, (p[1]-bbox[1]-chipUm.h/2)/UM_PER_UNIT]; }
    const chipShape = new THREE.Shape();
    chipShape.moveTo(-chipW/2, -chipH/2);
    chipShape.lineTo( chipW/2, -chipH/2);
    chipShape.lineTo( chipW/2,  chipH/2);
    chipShape.lineTo(-chipW/2,  chipH/2);
    chipShape.closePath();
    const trench134 = (data.layers['134']||[]).filter(p=>p && p.length>=3);
    for (const p of trench134){
      const hole = new THREE.Path();
      const a = nbMapPt(p[0]); hole.moveTo(a[0], a[1]);
      for (let i=1;i<p.length;i++){ const m=nbMapPt(p[i]); hole.lineTo(m[0], m[1]); }
      hole.closePath();
      chipShape.holes.push(hole);
    }
    const nbHeight = NB_THICKNESS_UM/UM_PER_UNIT;
    let nbMesh=null;
    try {
      const nbGeo = new THREE.ExtrudeGeometry(chipShape, {depth: nbHeight, bevelEnabled:false, curveSegments:1});
      const nbMat = new THREE.MeshStandardMaterial({color:0xc9d3de, metalness:0.95, roughness:0.28});
      nbMesh = new THREE.Mesh(nbGeo, nbMat);
      scene.add(nbMesh);
    } catch(e){
      console.warn('Nb extrusion failed, falling back to flat film:', e);
      const flat = new THREE.Mesh(new THREE.BoxGeometry(chipW, chipH, nbHeight), new THREE.MeshStandardMaterial({color:0xc9d3de, metalness:0.95, roughness:0.28}));
      flat.position.z = nbHeight/2;
      scene.add(flat);
    }

    function makeTexture(){
      const S=12288, c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
      // v13: transparent background — the 3D Nb extrusion is the visual base.
      // Don't paint layer 134 (it's real geometry now); paint other layers as ID overlays.
      g.clearRect(0,0,S,S);
      function map(pt){ return [(pt[0]-bbox[0])/chipUm.w*S, S-(pt[1]-bbox[1])/chipUm.h*S]; }
      const styles={
        '136':'rgba(248,250,252,.85)',
        '137':'rgba(215,226,238,.80)',
        '131':'rgba(255,150,250,.95)'
      };
      // v15: 146/147 are 3D meshes now, no longer painted on the texture.
      const order=['131','136','137'];
      for(const layer of order){ const polys=data.layers[layer]||[]; g.fillStyle=styles[layer]||'rgba(255,255,255,.6)';
        g.strokeStyle='rgba(255,255,255,.70)'; g.lineWidth=3;
        for(const p of polys){ if(!p||p.length<3) continue; g.beginPath(); const a=map(p[0]); g.moveTo(a[0],a[1]); for(let i=1;i<p.length;i++){const m=map(p[i]); g.lineTo(m[0],m[1]);} g.closePath(); g.fill(); g.stroke(); }
      }
      g.fillStyle='rgba(255,255,255,.75)'; g.font='36px system-ui'; g.fillText('GDS overlay v13: 131/136/137/146/147 (134 = real 3D etched holes)',40,70);
      const tex=new THREE.CanvasTexture(c);
      tex.anisotropy=Math.min(8, renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 1);
      tex.needsUpdate=true; return tex;
    }
    const topMat=new THREE.MeshBasicMaterial({map:makeTexture(),side:THREE.DoubleSide,transparent:true,depthWrite:false});
    const top=new THREE.Mesh(new THREE.PlaneGeometry(chipW,chipH),topMat);
    top.position.z = nbHeight + 0.0001; // sit just above the Nb top so layer overlays read clearly
    scene.add(top);
    const edge=new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), new THREE.LineBasicMaterial({color:0x88aaff,transparent:true,opacity:.35})); edge.position.copy(base.position); scene.add(edge);

    // ---- v13: 3D meshes for the qubit pads, junction leads, and Josephson junctions.
    // Sit on top of the Nb (z >= NB_THICKNESS_UM).
    const detailGroup = new THREE.Group(); scene.add(detailGroup);
    function shapeFromPoly(p){
      const s = new THREE.Shape();
      s.moveTo((p[0][0]-bbox[0]-chipUm.w/2)/UM_PER_UNIT, (p[0][1]-bbox[1]-chipUm.h/2)/UM_PER_UNIT);
      for (let i=1;i<p.length;i++){
        s.lineTo((p[i][0]-bbox[0]-chipUm.w/2)/UM_PER_UNIT, (p[i][1]-bbox[1]-chipUm.h/2)/UM_PER_UNIT);
      }
      return s;
    }
    function addLayerMeshes(layerId, color, emissive, emissiveIntensity, thickUm, baseZUm, opts){
      opts = opts || {};
      const polys = data.layers[layerId] || [];
      const tUnit = Math.max(thickUm/UM_PER_UNIT, 0.0001);
      const baseZ = baseZUm/UM_PER_UNIT;
      const matCfg = {
        color, emissive, emissiveIntensity,
        roughness: opts.roughness != null ? opts.roughness : 0.32,
        metalness: opts.metalness != null ? opts.metalness : 0.85
      };
      if (opts.opacity != null && opts.opacity < 1.0){
        matCfg.transparent = true;
        matCfg.opacity = opts.opacity;
        matCfg.depthWrite = false;
      }
      const mat = new THREE.MeshStandardMaterial(matCfg);
      for (const p of polys){
        if (!p || p.length<3) continue;
        try {
          const geo = new THREE.ExtrudeGeometry(shapeFromPoly(p), {depth: tUnit, bevelEnabled:false, curveSegments:2});
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.z = baseZ;
          detailGroup.add(mesh);
        } catch(e){}
      }
    }
    addLayerMeshes('136', 0xffe8b8, 0x402200, 0.35, 0.13, NB_THICKNESS_UM + 0.05);
    addLayerMeshes('137', 0xffd070, 0x553200, 0.55, 0.13, NB_THICKNESS_UM + 0.20);
    addLayerMeshes('131', 0xff66ee, 0xff44cc, 1.5, 0.08, NB_THICKNESS_UM + 0.34, {roughness:0.2, metalness:0.4});

    // ---- v15: bandaid crossover dielectric (layer 146) at 1.5x Nb thickness, sitting on top of Nb.
    // Translucent so the underlying chip remains readable.
    const D146_THICK = 1.5 * NB_THICKNESS_UM; // µm
    addLayerMeshes('146', 0x9be3ff, 0x224a66, 0.35, D146_THICK, NB_THICKNESS_UM, {roughness:0.45, metalness:0.05, opacity:0.55});
    // ---- v15: top metal of bandaid crossovers (layer 147) at 2.0x Nb thickness, on top of 146.
    const D147_THICK = 2.0 * NB_THICKNESS_UM; // µm
    addLayerMeshes('147', 0xeef4ff, 0x3a4a66, 0.20, D147_THICK, NB_THICKNESS_UM + D146_THICK, {roughness:0.3, metalness:0.85, opacity:0.92});

    // ---- blue/orange glow halos around the 8 lumped-element resonators
    const qubitCenters = [
      [6136, 4975],   [3814, 4975],
      [5925, 5762.5], [4025, 5762.5],
      [4975, 6266],   [4025, 3862.5],
      [4975, 3684],   [5925, 3862.5]
    ];
    const haloGroup = new THREE.Group(); scene.add(haloGroup);
    const halos = [];
    function makeHaloTex(isBlue){
      const cv = document.createElement('canvas'); cv.width=cv.height=512;
      const cg = cv.getContext('2d');
      const grd = cg.createRadialGradient(256,256,6,256,256,256);
      if (isBlue){
        grd.addColorStop(0,    'rgba(190,225,255,1.0)');
        grd.addColorStop(0.18, 'rgba(70,170,255,0.85)');
        grd.addColorStop(0.50, 'rgba(40,130,255,0.30)');
        grd.addColorStop(1.00, 'rgba(20,90,200,0)');
      } else {
        grd.addColorStop(0,    'rgba(255,235,180,1.0)');
        grd.addColorStop(0.18, 'rgba(255,165,40,0.85)');
        grd.addColorStop(0.50, 'rgba(255,110,20,0.30)');
        grd.addColorStop(1.00, 'rgba(180,60,0,0)');
      }
      cg.fillStyle = grd; cg.fillRect(0,0,512,512);
      return new THREE.CanvasTexture(cv);
    }
    qubitCenters.forEach(([cx,cy], i)=>{
      const isBlue = (i % 2 === 0);
      const tex = makeHaloTex(isBlue);
      const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, depthWrite:false, blending: THREE.AdditiveBlending});
      const sizeUm = 820;
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(sizeUm/UM_PER_UNIT, sizeUm/UM_PER_UNIT), mat);
      mesh.position.set((cx-chipUm.w/2)/UM_PER_UNIT, (cy-chipUm.h/2)/UM_PER_UNIT, nbHeight + 0.001);
      mesh.userData = {phase: i*0.785, isBlue};
      haloGroup.add(mesh); halos.push(mesh);
    });

    // ---- v16: ONE green sinusoidal glow per SQUID. No runway / no row of dots.
    function makeGreenTex(){
      const cv = document.createElement('canvas'); cv.width=cv.height=256;
      const cg = cv.getContext('2d');
      const grd = cg.createRadialGradient(128,128,2,128,128,124);
      grd.addColorStop(0,    'rgba(225,255,205,1.0)');
      grd.addColorStop(0.18, 'rgba(90,255,130,0.9)');
      grd.addColorStop(0.50, 'rgba(40,210,90,0.4)');
      grd.addColorStop(1.00, 'rgba(0,80,30,0)');
      cg.fillStyle = grd; cg.fillRect(0,0,256,256);
      return new THREE.CanvasTexture(cv);
    }
    const greenTex = makeGreenTex();
    const idcGroup = new THREE.Group(); scene.add(idcGroup);
    const idcPulses = [];
    qubitCenters.forEach(([cx,cy])=>{
      const sizeUm = 220; // single glow disc per SQUID
      const mat = new THREE.MeshBasicMaterial({map: greenTex, transparent:true, depthWrite:false, blending: THREE.AdditiveBlending});
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(sizeUm/UM_PER_UNIT, sizeUm/UM_PER_UNIT), mat);
      mesh.position.set((cx-chipUm.w/2)/UM_PER_UNIT, (cy-chipUm.h/2)/UM_PER_UNIT, nbHeight + 0.0008);
      mesh.userData = {base: sizeUm/UM_PER_UNIT};
      idcGroup.add(mesh); idcPulses.push(mesh);
    });

    // ---- floor: photon hovers on Nb at z=NB_THICKNESS_UM, dips to z=0 inside layer-134 etched openings.
    function polyBounds(poly){ let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity; for(const q of poly){ minx=Math.min(minx,q[0]); miny=Math.min(miny,q[1]); maxx=Math.max(maxx,q[0]); maxy=Math.max(maxy,q[1]); } return {minx,miny,maxx,maxy,w:maxx-minx,h:maxy-miny}; }
    const trenchPolys=trench134.map(poly=>({poly,b:polyBounds(poly)}));
    function pointInPoly(x,y,poly){ let inside=false; for(let i=0,j=poly.length-1;i<poly.length;j=i++){ const xi=poly[i][0]-bbox[0], yi=poly[i][1]-bbox[1], xj=poly[j][0]-bbox[0], yj=poly[j][1]-bbox[1]; const hit=((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi+1e-9)+xi); if(hit) inside=!inside; } return inside; }
    function isInTrench(x,y){ for(const t of trenchPolys){ const b=t.b; if(x+bbox[0]>=b.minx && x+bbox[0]<=b.maxx && y+bbox[1]>=b.miny && y+bbox[1]<=b.maxy && pointInPoly(x,y,t.poly)) return true; } return false; }
    function floorZAt(x,y){ return isInTrench(x,y) ? 0 : NB_THICKNESS_UM; }
    status.textContent='v17: smaller buttons, altitude clock, live mini-map, Qarakal | Basil HUD.'; setTimeout(()=>status.classList.add('hidden'),5500);

    function lookDirection(){
      return new THREE.Vector3(
        Math.sin(yaw)*Math.cos(pitch),
        Math.cos(yaw)*Math.cos(pitch),
        Math.sin(pitch)
      ).normalize();
    }
    function updateCamera(){
      yaw += (targetYaw-yaw)*0.12; pitch += (targetPitch-pitch)*0.12; pitch=Math.max(-1.35,Math.min(1.25,pitch));
      const wx=(state.x-chipUm.w/2)/UM_PER_UNIT, wy=(state.y-chipUm.h/2)/UM_PER_UNIT, wz=state.z/UM_PER_UNIT;
      camera.position.set(wx,wy,wz);
      const d=lookDirection();
      camera.lookAt(camera.position.x+d.x, camera.position.y+d.y, camera.position.z+d.z);
    }
    function forward(){ return lookDirection(); }

    // v15: vibration scales with proximity to the SQUID/qubit sites.
    // > 300 µm: nothing. At 300 µm: slow gentle pulse. Closer: faster + stronger.
    let lastVibrate = 0;
    function pulseVibrate(t){
      if (!navigator.vibrate) return;
      let minD = Infinity;
      for (const [cx,cy] of qubitCenters){
        const dx = state.x - cx, dy = state.y - cy;
        const dxy = Math.sqrt(dx*dx + dy*dy);
        const d3 = Math.sqrt(dxy*dxy + state.z*state.z);
        if (d3 < minD) minD = d3;
      }
      const RANGE = 300; // µm — silence beyond this
      if (minD > RANGE) return;
      const f = 1 - (minD / RANGE); // 0 = far edge, 1 = right at the SQUID
      // Pulse interval shrinks from 420 ms (at 300 µm) to 55 ms (very close).
      // Pulse duration grows from 14 ms to 75 ms.
      const interval = 420 - 365 * f;
      const duration = 14 + 61 * f;
      if (t - lastVibrate > interval){
        try { navigator.vibrate(duration); } catch(e){}
        lastVibrate = t;
      }
    }

    function step(t){ requestAnimationFrame(step); const dt=Math.min(.05,(t-lastT)/1000); lastT=t;
      if(motion && currentOri && initialOri){
        let da=(currentOri.alpha-initialOri.alpha)*Math.PI/180; if(da>Math.PI)da-=2*Math.PI; if(da<-Math.PI)da+=2*Math.PI;
        targetYaw=-da;
        const db=(currentOri.beta-initialOri.beta)*Math.PI/180;
        const dg=(currentOri.gamma-initialOri.gamma)*Math.PI/180;
        const tilt=Math.abs(dg)>Math.abs(db)*0.6 ? -dg : db;
        targetPitch=tilt - .42;
      }
      updateCamera();
      const boostFactor = boost ? 5 : 1;
      if(running){
        const zForSpeed=Math.max(0,state.z);
        const v=(9 + (zForSpeed/10)*(1 + 1.65*Math.pow(zForSpeed/maxZ,1.45))) * boostFactor;
        const f=forward();
        const tx = state.x + f.x*v*dt;
        const ty = state.y + f.y*v*dt;
        const tz = state.z + f.z*v*dt;
        // Rigid-Nb collision: photon cannot enter the Nb material.
        // If the new (x,y) has a higher floor than the photon's new z, it would clip into Nb -> block lateral move.
        const tFloor = floorZAt(tx, ty);
        if (tz < tFloor){
          // bounce against wall: keep old x,y, allow only vertical motion (and only upward to floor)
          state.z = Math.max(state.z, tFloor);
          // small "stick to wall" — preserves immersion
        } else {
          state.x = tx; state.y = ty; state.z = tz;
        }
        state.x=Math.max(0,Math.min(chipUm.w,state.x));
        state.y=Math.max(0,Math.min(chipUm.h,state.y));
        const floor=floorZAt(state.x,state.y);
        state.z=Math.max(floor,Math.min(maxZ,state.z));
      }
      pulseVibrate(t);
      const zForSpeed2=Math.max(0,state.z);
      const v=(9 + (zForSpeed2/10)*(1 + 1.65*Math.pow(zForSpeed2/maxZ,1.45))) * boostFactor;
      speedValue.textContent=v.toFixed(1);
      const maxSpeed=(9 + (maxZ/10)*(1+1.65)) * 5;
      const angle=-82+164*Math.max(0,Math.min(1,v/maxSpeed));
      needle.style.transform=`rotate(${angle}deg)`;
      // v17: altitude clock + mini-map
      const altFrac = Math.max(0, Math.min(1, state.z / maxZ));
      altValue.textContent = state.z.toFixed(0);
      altNeedle.style.transform = `rotate(${-82 + 164*altFrac}deg)`;
      const tt=t/1000;
      for (const h of halos){
        const breath = 0.55 + 0.45*Math.sin(tt*2.4 + h.userData.phase);
        h.material.opacity = 0.55 + 0.45*breath;
        const s = 1 + 0.10*breath;
        h.scale.set(s, s, 1);
      }
      // v16: every SQUID glow breathes sinusoidally with the same shared phase.
      // Just amplitude grow → drop → grow → drop. No runway sequencing.
      const squidPulse = 0.5 + 0.5*Math.sin(tt*1.6);
      for (const p of idcPulses){
        p.material.opacity = 0.10 + 0.90*squidPulse;
        const s = 0.55 + 0.55*squidPulse;
        p.scale.set(s, s, 1);
      }
      if(cardboard){
        renderer.setScissorTest(true); const w=innerWidth/2,h=innerHeight; camera.aspect=(w/h); camera.updateProjectionMatrix();
        renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h); renderer.render(scene,camera);
        renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h); renderer.render(scene,camera); renderer.setScissorTest(false);
      } else { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setViewport(0,0,innerWidth,innerHeight); renderer.render(scene,camera); }
    }
    requestAnimationFrame(step);

    let dragging=false,lastX=0,lastY=0;
    renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
    addEventListener('pointerup',()=>dragging=false);
    addEventListener('pointermove',e=>{ if(!dragging||motion) return; targetYaw-=(e.clientX-lastX)*0.005; targetPitch-=(e.clientY-lastY)*0.005; lastX=e.clientX; lastY=e.clientY; });
    addEventListener('deviceorientation',e=>{ currentOri={alpha:e.alpha||0,beta:e.beta||0,gamma:e.gamma||0}; }, true);

    const startBtn=document.getElementById('startBtn');
    const boostBtn=document.getElementById('boostBtn');
    const cardboardBtn=document.getElementById('cardboardBtn');
    function refreshUiVisibility(){
      // Hide the boost button + the whole HUD strip in cardboard split view; re-show otherwise.
      boostBtn.style.display = cardboard ? 'none' : '';
      hud.style.display = cardboard ? 'none' : '';
    }
    startBtn.onclick=()=>{ running=!running; startBtn.textContent=running?'PAUSE':'START FLYING'; };
    boostBtn.onclick=()=>{
      boost=!boost;
      boostBtn.textContent='BOOST: '+(boost?'ON x5':'OFF');
      boostBtn.classList.toggle('active', boost);
      // brief tactile feedback when boost engaged on mobile
      if (boost && navigator.vibrate) { try{ navigator.vibrate(20);}catch(e){} }
    };
    cardboardBtn.onclick=()=>{ cardboard=!cardboard; cardboardBtn.textContent='CARDBOARD SPLIT: '+(cardboard?'ON':'OFF'); refreshUiVisibility(); };
    document.getElementById('resetBtn').onclick=()=>{ state.x=chipUm.w/2; state.y=chipUm.h/2; state.z=2200; targetYaw=yaw=0; targetPitch=pitch=-0.42; initialOri=currentOri; };
    document.getElementById('fullBtn').onclick=async()=>{ try{ if(!document.fullscreenElement){ await document.documentElement.requestFullscreen(); document.getElementById('fullBtn').textContent='EXIT FULL SCREEN'; } else { await document.exitFullscreen(); document.getElementById('fullBtn').textContent='FULL SCREEN'; } }catch(err){ status.classList.remove('hidden'); status.textContent='Fullscreen unavailable: '+err.message; } };
    document.getElementById('motionBtn').onclick=async()=>{ const btn=document.getElementById('motionBtn'); try{ if(motion){ motion=false; btn.textContent='ENABLE PHONE MOTION'; status.classList.remove('hidden'); status.textContent='Phone motion disabled. Touch-drag look is active again.'; setTimeout(()=>status.classList.add('hidden'),3500); return; } if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){ const r=await DeviceOrientationEvent.requestPermission(); if(r!=='granted'){status.classList.remove('hidden'); status.textContent='Phone motion permission denied.'; return;} } motion=true; btn.textContent='DISABLE PHONE MOTION'; initialOri=currentOri||{alpha:0,beta:0,gamma:0}; status.classList.remove('hidden'); status.textContent='Phone motion enabled. Move/tilt the phone; touch drag is disabled while motion is on.'; setTimeout(()=>status.classList.add('hidden'),5000); }catch(err){ status.classList.remove('hidden'); status.textContent='Motion error: '+err.message; } };
    addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);});
    refreshUiVisibility();
  })();
  </script>
</body>
</html>
