<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Quantum Chip Photon VR v12</title>
  <style>
    html,body{margin:0;overflow:hidden;background:#030609;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}
    #ui{position:fixed;left:10px;top:10px;z-index:10;display:flex;gap:8px;flex-wrap:wrap;max-width:92vw}
    button{border:0;border-radius:12px;padding:12px 14px;font-weight:800;font-size:14px;background:#59ffc0;color:#02110c;box-shadow:0 0 18px rgba(89,255,192,.35)}
    button.secondary{background:#ffe16b;color:#100d00} button.dark{background:#dde8ff;color:#06101f}
    #hud{position:fixed;right:10px;bottom:10px;z-index:10;background:rgba(0,0,0,.50);padding:5px 7px;border-radius:12px;width:96px;font-size:8px;text-align:center;border:1px solid rgba(255,255,255,.12);box-shadow:0 0 14px rgba(89,255,192,.12)}
    #speedLabel{font-size:8px;opacity:.75;text-transform:uppercase;letter-spacing:.07em}
    #speedValue{font-size:16px;font-weight:900;line-height:1.0;margin:1px 0}
    #speedUnit{font-size:8px;opacity:.78}
    #gauge{position:relative;width:82px;height:22px;margin:2px auto 0;overflow:hidden}
    #arc{position:absolute;left:7px;top:3px;width:66px;height:33px;border:3px solid rgba(221,232,255,.28);border-bottom:0;border-radius:66px 66px 0 0}
    #needle{position:absolute;left:40px;bottom:0;width:2px;height:21px;background:#59ffc0;border-radius:3px;transform-origin:50% 100%;transform:rotate(-82deg);box-shadow:0 0 8px rgba(89,255,192,.7)}
    #status{position:fixed;right:10px;top:10px;z-index:10;background:rgba(0,0,0,.62);padding:10px 12px;border-radius:10px;font-size:13px;transition:opacity .7s ease}
    #status.hidden{opacity:0;pointer-events:none}
    #center{position:fixed;left:50%;top:50%;width:10px;height:10px;margin-left:-5px;margin-top:-5px;border:1px solid rgba(255,255,255,.7);border-radius:50%;z-index:9;pointer-events:none}
    canvas{display:block}
  </style>
</head>
<body>
  <div id="ui">
    <button id="startBtn">START FLYING</button>
    <button class="secondary" id="motionBtn">ENABLE PHONE MOTION</button>
    <button class="dark" id="cardboardBtn">CARDBOARD SPLIT: OFF</button>
    <button class="dark" id="resetBtn">RESET</button>
    <button class="dark" id="fullBtn">FULL SCREEN</button>
  </div>
  <div id="status">Loading real GDS texture...</div>
  <div id="hud"><div id="speedLabel">photon speed</div><div id="speedValue">—</div><div id="speedUnit">µm/s</div><div id="gauge"><div id="arc"></div><div id="needle"></div></div></div>
  <div id="center"></div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
  <script src="chip-data.js"></script>
  <script>
  (()=>{
    const status=document.getElementById('status'), hud=document.getElementById('hud'), speedValue=document.getElementById('speedValue'), needle=document.getElementById('needle');
    let running=false, cardboard=false, motion=false;
    let yaw=0, pitch=-0.42, targetYaw=0, targetPitch=-0.42, lastT=performance.now();
    let initialOri=null, currentOri=null;
    const data=window.CHIP_DATA || {bbox:[0,0,10000,10000],layers:{}};
    const bbox=data.bbox || [0,0,10000,10000];
    const chipUm={w:bbox[2]-bbox[0], h:bbox[3]-bbox[1]};
    const UM_PER_UNIT=1000;
    const chipW=chipUm.w/UM_PER_UNIT, chipH=chipUm.h/UM_PER_UNIT;
    const maxZ=10000, minZ=0;
    const state={x:chipUm.w/2, y:chipUm.h/2, z:2200};
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x030609);
    const camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.002, 80);
    camera.up.set(0,0,1);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(Math.min(devicePixelRatio||1,3.5)); renderer.setSize(innerWidth,innerHeight); document.body.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff,0x445566,1.25));
    const dirLight=new THREE.DirectionalLight(0xffffff,1.2); dirLight.position.set(2,5,3); scene.add(dirLight);
    const siThicknessUnit=500/UM_PER_UNIT;
    const nbThicknessUnit=0.2/UM_PER_UNIT;
    const baseGeo=new THREE.BoxGeometry(chipW,chipH,siThicknessUnit);
    const baseMat=new THREE.MeshStandardMaterial({color:0x171a1d,roughness:.9,metalness:.01});
    const base=new THREE.Mesh(baseGeo,baseMat); base.position.set(0,0,-siThicknessUnit/2); scene.add(base);
    const nbFilm=new THREE.Mesh(new THREE.BoxGeometry(chipW,chipH,Math.max(nbThicknessUnit,0.001)), new THREE.MeshStandardMaterial({color:0xf1f4f7,roughness:.22,metalness:.95,transparent:true,opacity:.86}));
    nbFilm.position.set(0,0,0.0005); scene.add(nbFilm);
    function makeTexture(){
      const S=12288, c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
      g.fillStyle='#171a1d'; g.fillRect(0,0,S,S);
      function map(pt){ return [(pt[0]-bbox[0])/chipUm.w*S, S-(pt[1]-bbox[1])/chipUm.h*S]; }
      const styles={
        '134':'rgba(0,0,0,.98)',
        '136':'rgba(248,250,252,.98)',
        '137':'rgba(215,226,238,.96)',
        '146':'rgba(255,215,95,.74)',
        '147':'rgba(255,130,230,.68)',
        '131':'rgba(245,250,255,.72)'
      };
      const order=['134','131','136','137','146','147'];
      for(const layer of order){ const polys=data.layers[layer]||[]; g.fillStyle=styles[layer]||'rgba(255,255,255,.6)';
        g.strokeStyle=layer==='134'?'rgba(0,0,0,.95)':'rgba(255,255,255,.70)'; g.lineWidth=3;
        for(const p of polys){ if(!p||p.length<3) continue; g.beginPath(); const a=map(p[0]); g.moveTo(a[0],a[1]); for(let i=1;i<p.length;i++){const m=map(p[i]); g.lineTo(m[0],m[1]);} g.closePath(); g.fill(); if(layer!=='134') g.stroke(); }
      }
      g.fillStyle='rgba(255,255,255,.75)'; g.font='36px system-ui'; g.fillText('Real GDS layout texture v12: layers 134, 131, 136, 137, 146, 147',40,70);
      const tex=new THREE.CanvasTexture(c);
      const maxAniso = renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 1;
      tex.anisotropy = maxAniso;
      tex.minFilter = THREE.LinearMipMapLinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = true;
      tex.needsUpdate=true; return tex;
    }
    const topMat=new THREE.MeshBasicMaterial({map:makeTexture(),side:THREE.DoubleSide});
    const top=new THREE.Mesh(new THREE.PlaneGeometry(chipW,chipH),topMat); top.position.z=0.002; scene.add(top);
    const edge=new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), new THREE.LineBasicMaterial({color:0x88aaff,transparent:true,opacity:.35})); edge.position.copy(base.position); scene.add(edge);

    const waveGroup=new THREE.Group(); scene.add(waveGroup);
    const waveObjects=[];
    function polyBounds(poly){ let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity; for(const q of poly){ minx=Math.min(minx,q[0]); miny=Math.min(miny,q[1]); maxx=Math.max(maxx,q[0]); maxy=Math.max(maxy,q[1]); } return {minx,miny,maxx,maxy,w:maxx-minx,h:maxy-miny}; }
    function mkLine(points, color, opacity, widthHint){
      const geo=new THREE.BufferGeometry().setFromPoints(points);
      const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity});
      const line=new THREE.Line(geo,mat); line.userData.widthHint=widthHint||1; waveGroup.add(line); waveObjects.push(line); return line;
    }
    function addFlareResonator(cxUm, cyUm, wUm, hUm, angle, kind){
      const count = kind==='spiral' ? 46 : 64;
      for(let j=0;j<count;j++){
        const pts=[]; const N=34;
        const lane=(j/(count-1)-0.5);
        const phase=Math.random()*Math.PI*2;
        const color = j%2 ? 0x1aa7ff : 0xff8a18;
        for(let i=0;i<N;i++){
          const f=i/(N-1);
          let x,y;
          if(kind==='spiral'){
            const th=phase + f*Math.PI*5.6;
            const r=(0.12+0.78*f)*(Math.min(wUm,hUm)*0.48) + lane*18*Math.sin(f*Math.PI*4);
            x=cxUm+r*Math.cos(th); y=cyUm+r*Math.sin(th);
          } else {
            const u=(f-0.5)*wUm;
            const edge=Math.sign(lane||1);
            const v=lane*hUm*0.82 + edge*20*Math.sin(f*Math.PI*2+phase);
            const antinode=Math.sin(Math.PI*f)*Math.sin(6*Math.PI*f+phase);
            const flare=antinode*(18+22*Math.abs(lane));
            x=cxUm + u*Math.cos(angle) - (v+flare)*Math.sin(angle);
            y=cyUm + u*Math.sin(angle) + (v+flare)*Math.cos(angle);
          }
          pts.push(new THREE.Vector3((x-chipUm.w/2)/UM_PER_UNIT,(y-chipUm.h/2)/UM_PER_UNIT,0.055+0.0008*j));
        }
        const line=mkLine(pts,color,0.22+0.24*Math.random());
        line.userData={kind:'flare',base:pts.map(p=>p.clone()),phase,amp:(kind==='spiral'?0.020:0.035),breath:3.4+Math.random()*2.4,color};
      }
      const canvas=document.createElement('canvas'); canvas.width=512; canvas.height=512; const g=canvas.getContext('2d');
      const grd=g.createRadialGradient(256,256,18,256,256,250);
      grd.addColorStop(0,'rgba(255,160,35,.38)'); grd.addColorStop(.45,'rgba(35,165,255,.20)'); grd.addColorStop(1,'rgba(0,0,0,0)');
      g.fillStyle=grd; g.fillRect(0,0,512,512);
      const tex=new THREE.CanvasTexture(canvas);
      const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:.36,depthWrite:false,blending:THREE.AdditiveBlending});
      const mesh=new THREE.Mesh(new THREE.PlaneGeometry(wUm/UM_PER_UNIT,hUm/UM_PER_UNIT),mat);
      mesh.position.set((cxUm-chipUm.w/2)/UM_PER_UNIT,(cyUm-chipUm.h/2)/UM_PER_UNIT,0.048); mesh.rotation.z=angle; mesh.userData={kind:'glow',phase:Math.random()*6.28};
      waveGroup.add(mesh); waveObjects.push(mesh);
    }
    function addTravelingEM(cxUm,cyUm,lenUm,angle){
      for(let c=0;c<2;c++){
        const pts=[]; const N=110; const offset=(c?18:-18);
        for(let i=0;i<N;i++){
          const f=i/(N-1); const u=(f-0.5)*lenUm; const v=offset + 18*Math.sin(f*Math.PI*8);
          const x=cxUm+u*Math.cos(angle)-v*Math.sin(angle); const y=cyUm+u*Math.sin(angle)+v*Math.cos(angle);
          pts.push(new THREE.Vector3((x-chipUm.w/2)/UM_PER_UNIT,(y-chipUm.h/2)/UM_PER_UNIT,0.043));
        }
        const line=mkLine(pts,c?0x1aa7ff:0xff8a18,.62);
        line.userData={kind:'em',base:pts.map(p=>p.clone()),phase:c*Math.PI,amp:0.018,angle};
      }
    }
    function addFields(){
      addFlareResonator(chipUm.w*0.50, chipUm.h*0.73, chipUm.w*0.46, chipUm.h*0.16, 0, 'rect');
      addFlareResonator(chipUm.w*0.50, chipUm.h*0.42, chipUm.w*0.36, chipUm.h*0.28, 0, 'spiral');
      addTravelingEM(chipUm.w*0.50, chipUm.h*0.61, chipUm.w*0.54, 0);
      addTravelingEM(chipUm.w*0.73, chipUm.h*0.55, chipUm.h*0.30, Math.PI/2);
    }
    // v12: old wave/flare visualization replaced by the blue/orange halos below.
    // addFields();

    // ---- v12: real 3D meshes for the qubit pads, junction leads, and Josephson junctions.
    const detailGroup = new THREE.Group(); scene.add(detailGroup);
    function shapeFromPoly(p){
      const s = new THREE.Shape();
      s.moveTo((p[0][0]-bbox[0]-chipUm.w/2)/UM_PER_UNIT, (p[0][1]-bbox[1]-chipUm.h/2)/UM_PER_UNIT);
      for (let i=1;i<p.length;i++){
        s.lineTo((p[i][0]-bbox[0]-chipUm.w/2)/UM_PER_UNIT, (p[i][1]-bbox[1]-chipUm.h/2)/UM_PER_UNIT);
      }
      return s;
    }
    function addLayerMeshes(layerId, color, emissive, emissiveIntensity, thickUm, baseZUm, opts){
      opts = opts || {};
      const polys = data.layers[layerId] || [];
      const tUnit = Math.max(thickUm/UM_PER_UNIT, 0.0001);
      const baseZ = baseZUm/UM_PER_UNIT;
      const mat = new THREE.MeshStandardMaterial({
        color, emissive, emissiveIntensity,
        roughness: opts.roughness != null ? opts.roughness : 0.32,
        metalness: opts.metalness != null ? opts.metalness : 0.85
      });
      for (const p of polys){
        if (!p || p.length<3) continue;
        try {
          const geo = new THREE.ExtrudeGeometry(shapeFromPoly(p), {depth: tUnit, bevelEnabled:false, curveSegments:2});
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.z = baseZ;
          detailGroup.add(mesh);
        } catch(e){}
      }
    }
    addLayerMeshes('136', 0xffe8b8, 0x402200, 0.35, 0.13, 0.20);
    addLayerMeshes('137', 0xffd070, 0x553200, 0.55, 0.13, 0.34);
    addLayerMeshes('131', 0xff66ee, 0xff44cc, 1.5, 0.08, 0.47, {roughness:0.2, metalness:0.4});

    // ---- v12: blue/orange glow halos around the 8 lumped-element resonators.
    const qubitCenters = [
      [6136, 4975],   [3814, 4975],
      [5925, 5762.5], [4025, 5762.5],
      [4975, 6266],   [4025, 3862.5],
      [4975, 3684],   [5925, 3862.5]
    ];
    const haloGroup = new THREE.Group(); scene.add(haloGroup);
    const halos = [];
    function makeHaloTex(isBlue){
      const cv = document.createElement('canvas'); cv.width=cv.height=512;
      const cg = cv.getContext('2d');
      const grd = cg.createRadialGradient(256,256,6,256,256,256);
      if (isBlue){
        grd.addColorStop(0,    'rgba(190,225,255,1.0)');
        grd.addColorStop(0.18, 'rgba(70,170,255,0.85)');
        grd.addColorStop(0.50, 'rgba(40,130,255,0.30)');
        grd.addColorStop(1.00, 'rgba(20,90,200,0)');
      } else {
        grd.addColorStop(0,    'rgba(255,235,180,1.0)');
        grd.addColorStop(0.18, 'rgba(255,165,40,0.85)');
        grd.addColorStop(0.50, 'rgba(255,110,20,0.30)');
        grd.addColorStop(1.00, 'rgba(180,60,0,0)');
      }
      cg.fillStyle = grd; cg.fillRect(0,0,512,512);
      return new THREE.CanvasTexture(cv);
    }
    qubitCenters.forEach(([cx,cy], i)=>{
      const isBlue = (i % 2 === 0);
      const tex = makeHaloTex(isBlue);
      const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, depthWrite:false, blending: THREE.AdditiveBlending});
      const sizeUm = 820;
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(sizeUm/UM_PER_UNIT, sizeUm/UM_PER_UNIT), mat);
      mesh.position.set((cx-chipUm.w/2)/UM_PER_UNIT, (cy-chipUm.h/2)/UM_PER_UNIT, 0.025);
      mesh.userData = {phase: i*0.785, isBlue};
      haloGroup.add(mesh); halos.push(mesh);
    });

    const trenchPolys=(data.layers['134']||[]).map(poly=>({poly,b:polyBounds(poly)}));
    function pointInPoly(x,y,poly){ let inside=false; for(let i=0,j=poly.length-1;i<poly.length;j=i++){ const xi=poly[i][0]-bbox[0], yi=poly[i][1]-bbox[1], xj=poly[j][0]-bbox[0], yj=poly[j][1]-bbox[1]; const hit=((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi+1e-9)+xi); if(hit) inside=!inside; } return inside; }
    function isInTrench(x,y){ for(const t of trenchPolys){ const b=t.b; if(x+bbox[0]>=b.minx && x+bbox[0]<=b.maxx && y+bbox[1]>=b.miny && y+bbox[1]<=b.maxy && pointInPoly(x,y,t.poly)) return true; } return false; }
    // v12 floor fix: photon body is ~5 um wide. Outside etched openings, floor = 5 um (hovers above the
    // Nb film + texture so the chip layout stays visible looking down). In etched openings (layer 134),
    // floor = 0 (the Si surface where Nb has been removed) so the photon can dip into the trench.
    function floorZAt(x,y){ return isInTrench(x,y) ? 0 : 5; }
    status.textContent='v12: junctions resolve close up; 8 blue/orange resonator halos active.'; setTimeout(()=>status.classList.add('hidden'),5000);
    function lookDirection(){
      return new THREE.Vector3(
        Math.sin(yaw)*Math.cos(pitch),
        Math.cos(yaw)*Math.cos(pitch),
        Math.sin(pitch)
      ).normalize();
    }
    function updateCamera(){
      yaw += (targetYaw-yaw)*0.12; pitch += (targetPitch-pitch)*0.12; pitch=Math.max(-1.35,Math.min(1.25,pitch));
      const wx=(state.x-chipUm.w/2)/UM_PER_UNIT, wy=(state.y-chipUm.h/2)/UM_PER_UNIT, wz=state.z/UM_PER_UNIT;
      camera.position.set(wx,wy,wz);
      const d=lookDirection();
      camera.lookAt(camera.position.x+d.x, camera.position.y+d.y, camera.position.z+d.z);
    }
    function forward(){ return lookDirection(); }
    function step(t){ requestAnimationFrame(step); const dt=Math.min(.05,(t-lastT)/1000); lastT=t;
      if(motion && currentOri && initialOri){
        let da=(currentOri.alpha-initialOri.alpha)*Math.PI/180; if(da>Math.PI)da-=2*Math.PI; if(da<-Math.PI)da+=2*Math.PI;
        targetYaw=-da;
        const db=(currentOri.beta-initialOri.beta)*Math.PI/180;
        const dg=(currentOri.gamma-initialOri.gamma)*Math.PI/180;
        const tilt=Math.abs(dg)>Math.abs(db)*0.6 ? -dg : db;
        targetPitch=tilt - .42;
      }
      updateCamera();
      if(running){ const zForSpeed=Math.max(0,state.z); const v=9 + (zForSpeed/10)*(1 + 1.65*Math.pow(zForSpeed/maxZ,1.45)); const f=forward(); state.x += f.x*v*dt; state.y += f.y*v*dt; state.z += f.z*v*dt;
        state.x=Math.max(0,Math.min(chipUm.w,state.x)); state.y=Math.max(0,Math.min(chipUm.h,state.y)); const floor=floorZAt(state.x,state.y); state.z=Math.max(floor,Math.min(maxZ,state.z)); }
      const zForSpeed2=Math.max(0,state.z); const v=9 + (zForSpeed2/10)*(1 + 1.65*Math.pow(zForSpeed2/maxZ,1.45)); speedValue.textContent=v.toFixed(1); const maxSpeed=9 + (maxZ/10)*(1+1.65); const angle=-82+164*Math.max(0,Math.min(1,v/maxSpeed)); needle.style.transform=`rotate(${angle}deg)`;
      const tt=t/1000;
      for (const h of halos){
        const breath = 0.55 + 0.45*Math.sin(tt*2.4 + h.userData.phase);
        h.material.opacity = 0.55 + 0.45*breath;
        const s = 1 + 0.10*breath;
        h.scale.set(s, s, 1);
      }
      for(const obj of waveObjects){ if(obj.isLine){ const pos=obj.geometry.attributes.position; const base=obj.userData.base; if(obj.userData.kind==='em'){ const ang=obj.userData.angle+Math.PI/2; for(let i=0;i<base.length;i++){ const travel=Math.sin(i*.28-tt*5.2+obj.userData.phase); pos.setXYZ(i, base[i].x+Math.cos(ang)*obj.userData.amp*travel, base[i].y+Math.sin(ang)*obj.userData.amp*travel, base[i].z+0.014*Math.abs(travel)); } obj.material.opacity=.30+.45*Math.abs(Math.sin(tt*3.6+obj.userData.phase)); } else { for(let i=0;i<base.length;i++){ const flare=Math.sin(tt*obj.userData.breath+obj.userData.phase+i*.23); pos.setXYZ(i, base[i].x, base[i].y, base[i].z+obj.userData.amp*Math.abs(flare)); } obj.material.opacity=.18+.46*Math.abs(Math.sin(tt*obj.userData.breath+obj.userData.phase)); } pos.needsUpdate=true; } else if(obj.userData.kind==='glow'){ const pulse=.55+.45*Math.abs(Math.sin(tt*2.7+obj.userData.phase)); obj.material.opacity=.20+.26*pulse; obj.scale.set(1+.035*pulse,1+.035*pulse,1); } }
      if(cardboard){
        renderer.setScissorTest(true); const w=innerWidth/2,h=innerHeight; camera.aspect=(w/h); camera.updateProjectionMatrix();
        renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h); renderer.render(scene,camera);
        renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h); renderer.render(scene,camera); renderer.setScissorTest(false);
      } else { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setViewport(0,0,innerWidth,innerHeight); renderer.render(scene,camera); }
    }
    requestAnimationFrame(step);
    let dragging=false,lastX=0,lastY=0;
    renderer.domElement.addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
    addEventListener('pointerup',()=>dragging=false); addEventListener('pointermove',e=>{ if(!dragging||motion) return; targetYaw-=(e.clientX-lastX)*0.005; targetPitch-=(e.clientY-lastY)*0.005; lastX=e.clientX; lastY=e.clientY; });
    addEventListener('deviceorientation',e=>{ currentOri={alpha:e.alpha||0,beta:e.beta||0,gamma:e.gamma||0}; }, true);
    document.getElementById('startBtn').onclick=()=>{ running=!running; document.getElementById('startBtn').textContent=running?'PAUSE':'START FLYING'; };
    document.getElementById('cardboardBtn').onclick=()=>{ cardboard=!cardboard; document.getElementById('cardboardBtn').textContent='CARDBOARD SPLIT: '+(cardboard?'ON':'OFF'); };
    document.getElementById('resetBtn').onclick=()=>{ state.x=chipUm.w/2; state.y=chipUm.h/2; state.z=2200; targetYaw=yaw=0; targetPitch=pitch=-0.42; initialOri=currentOri; };
    document.getElementById('fullBtn').onclick=async()=>{ try{ if(!document.fullscreenElement){ await document.documentElement.requestFullscreen(); document.getElementById('fullBtn').textContent='EXIT FULL SCREEN'; } else { await document.exitFullscreen(); document.getElementById('fullBtn').textContent='FULL SCREEN'; } }catch(err){ status.classList.remove('hidden'); status.textContent='Fullscreen unavailable: '+err.message; } };
    document.getElementById('motionBtn').onclick=async()=>{ const btn=document.getElementById('motionBtn'); try{ if(motion){ motion=false; btn.textContent='ENABLE PHONE MOTION'; status.classList.remove('hidden'); status.textContent='Phone motion disabled. Touch-drag look is active again.'; setTimeout(()=>status.classList.add('hidden'),3500); return; } if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){ const r=await DeviceOrientationEvent.requestPermission(); if(r!=='granted'){status.classList.remove('hidden'); status.textContent='Phone motion permission denied.'; return;} } motion=true; btn.textContent='DISABLE PHONE MOTION'; initialOri=currentOri||{alpha:0,beta:0,gamma:0}; status.classList.remove('hidden'); status.textContent='Phone motion enabled. Move/tilt the phone; touch drag is disabled while motion is on.'; setTimeout(()=>status.classList.add('hidden'),5000); }catch(err){ status.classList.remove('hidden'); status.textContent='Motion error: '+err.message; } };
    addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);});
  })();
  </script>
</body>
</html>
